name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: public-mcp-production-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloud Run (Production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_PROD_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_PROD_SA_EMAIL }}
          project_id: ${{ secrets.GCP_PROD_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROD_PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: docker build -t gcr.io/${{ secrets.GCP_PROD_PROJECT_ID }}/plateful-public-mcp .

      - name: Push Docker image
        run: docker push gcr.io/${{ secrets.GCP_PROD_PROJECT_ID }}/plateful-public-mcp

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy plateful-public-mcp \
            --image gcr.io/${{ secrets.GCP_PROD_PROJECT_ID }}/plateful-public-mcp \
            --region europe-west2 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars=LARAVEL_API_URL=https://api.plateful.uk/api \
            --project=${{ secrets.GCP_PROD_PROJECT_ID }}

      - name: Verify deployment
        run: |
          echo "Waiting 15 seconds for deployment to stabilise..."
          sleep 15
          HEALTH_URL=$(gcloud run services describe plateful-public-mcp --region europe-west2 --project=${{ secrets.GCP_PROD_PROJECT_ID }} --format="value(status.url)")
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL/health")
          echo "Health check returned: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Health check returned $HTTP_STATUS"
          else
            echo "Deployment verified successfully!"
          fi
